<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NCKU LLM</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Microsoft JhengHei", sans-serif;
    background: #f1f5f9;
    color: #1e293b;
  }

  .header {
    background: #243c8f;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title {
    font-size: 18px;
    font-weight: 700;
  }

  .main {
    padding: 40px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .hero {
    background: white;
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  }

  .hero h1 {
    margin: 0 0 12px;
    font-size: 28px;
  }

  .hero p {
    margin: 0 0 24px;
    color: #475569;
    line-height: 1.7;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .btn-primary {
    background: #243c8f;
    color: white;
  }

  .btn-primary:hover {
    background: #1d3278;
  }

  .btn-light {
    background: white;
    color: #243c8f;
  }

  .btn-light:hover {
    background: #e2e8f0;
  }

  /* 遮罩 */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
    z-index: 999;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* 右側滑入面板 */
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: min(92vw, 1100px);
    height: 100vh;
    background: #ffffff;
    box-shadow: -10px 0 30px rgba(15, 23, 42, 0.18);
    transform: translateX(100%);
    transition: transform 0.32s ease;
    z-index: 1000;
    display: flex;
    flex-direction: column;
  }

  .drawer.show {
    transform: translateX(0);
  }

  .drawer-header {
    height: 64px;
    background: #243c8f;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px 0 20px;
    flex-shrink: 0;
  }

  .drawer-title {
    font-size: 16px;
    font-weight: 700;
  }

  .drawer-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .icon-btn {
    border: none;
    background: rgba(255,255,255,0.14);
    color: white;
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
  }

  .icon-btn:hover {
    background: rgba(255,255,255,0.24);
  }

  .drawer-body {
    position: relative;
    flex: 1;
    background: #f8fafc;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: white;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #64748b;
    font-size: 14px;
    background: #f8fafc;
    z-index: 2;
  }

  .hidden {
    display: none !important;
  }

  .fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    background: #f8fafc;
    color: #334155;
    text-align: center;
    padding: 24px;
    z-index: 3;
  }

  .fallback h3 {
    margin: 0;
    font-size: 20px;
  }

  .fallback p {
    margin: 0;
    color: #64748b;
    line-height: 1.6;
  }

  @media (max-width: 768px) {
    .drawer {
      width: 100vw;
    }

    .hero {
      padding: 24px;
    }

    .hero h1 {
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<header class="header">
  <div class="title">國立成功大學永續策略發展處 LLM 系統</div>
  <button class="btn btn-light" onclick="openDrawer()">開啟系統</button>
</header>

<main class="main">
  <section class="hero">
    <h1>校內 LLM 系統入口</h1>
    <p>
      點擊下方按鈕後，系統會從右側滑入顯示。若目標系統不允許嵌入，會自動顯示替代操作按鈕。
    </p>
    <button class="btn btn-primary" onclick="openDrawer()">立即進入</button>
  </section>
</main>

<div id="overlay" class="overlay" onclick="closeDrawer()"></div>

<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawer-header">
    <div class="drawer-title">NCKU LLM 系統</div>
    <div class="drawer-actions">
      <button class="icon-btn" onclick="openApp()">另開視窗</button>
      <button class="icon-btn" onclick="closeDrawer()">關閉</button>
    </div>
  </div>

  <div class="drawer-body">
    <div id="loading" class="loading">載入系統中...</div>

    <iframe
      id="appFrame"
      title="NCKU LLM"
      src=""
      onload="hideLoading()">
    </iframe>

    <div id="fallback" class="fallback">
      <h3>系統無法嵌入顯示</h3>
      <p>此系統可能因安全性設定而無法在本頁面中開啟，請改用新視窗進入。</p>
      <button class="btn btn-primary" onclick="openApp()">點此開啟系統</button>
    </div>
  </div>
</aside>

<script>
  const APP_URL = "https://undescriptively-solar-lang.ngrok-free.dev/";
  const drawer = document.getElementById("drawer");
  const overlay = document.getElementById("overlay");
  const frame = document.getElementById("appFrame");
  const loading = document.getElementById("loading");
  const fallback = document.getElementById("fallback");

  let loadTimer = null;
  let loaded = false;
  let initialized = false;

  function openDrawer() {
    drawer.classList.add("show");
    overlay.classList.add("show");
    drawer.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";

    loading.classList.remove("hidden");
    fallback.style.display = "none";
    loaded = false;

    if (!initialized) {
      frame.src = APP_URL;
      initialized = true;
    }

    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => {
      if (!loaded) {
        loading.classList.add("hidden");
        fallback.style.display = "flex";
      }
    }, 3000);
  }

  function closeDrawer() {
    drawer.classList.remove("show");
    overlay.classList.remove("show");
    drawer.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  function openApp() {
    window.open(APP_URL, "_blank", "noopener,noreferrer");
  }

  function hideLoading() {
    loaded = true;
    clearTimeout(loadTimer);
    loading.classList.add("hidden");
    fallback.style.display = "none";
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeDrawer();
    }
  });
</script>

</body>
</html>
