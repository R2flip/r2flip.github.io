<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NCKU LLM</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Microsoft JhengHei", sans-serif;
    background: #f1f5f9;
    color: #1e293b;
  }

  .header {
    background: #243c8f;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title {
    font-size: 18px;
    font-weight: 700;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .btn-primary {
    background: #243c8f;
    color: white;
  }

  .btn-primary:hover {
    background: #1d3278;
  }

  .btn-light {
    background: white;
    color: #243c8f;
  }

  .btn-light:hover {
    background: #e2e8f0;
  }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 20px;
  }

  .hero {
    background: white;
    border-radius: 24px;
    padding: 36px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  }

  .hero h1 {
    margin: 0 0 12px;
    font-size: 30px;
  }

  .hero p {
    margin: 0 0 24px;
    color: #475569;
    line-height: 1.8;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 999;
  }

  .modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    position: fixed;
    inset: 20px;
    background: white;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.25);
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: scale(0.985) translateY(10px);
    pointer-events: none;
    transition: all 0.28s ease;
    z-index: 1000;
  }

  .modal.show {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }

  .modal-header {
    height: 64px;
    background: #243c8f;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px 0 22px;
    flex-shrink: 0;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .icon-btn {
    border: none;
    background: rgba(255,255,255,0.14);
    color: white;
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
  }

  .icon-btn:hover {
    background: rgba(255,255,255,0.24);
  }

  .modal-body {
    position: relative;
    flex: 1;
    background: #f8fafc;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
    display: block;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8fafc;
    color: #64748b;
    font-size: 14px;
    z-index: 2;
  }

  .hidden {
    display: none !important;
  }

  .fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    text-align: center;
    padding: 24px;
    background: #f8fafc;
    color: #334155;
    z-index: 3;
  }

  .fallback h3 {
    margin: 0;
    font-size: 22px;
  }

  .fallback p {
    margin: 0;
    line-height: 1.7;
    color: #64748b;
    max-width: 520px;
  }

  @media (max-width: 768px) {
    .modal {
      inset: 0;
      border-radius: 0;
    }

    .hero {
      padding: 24px;
    }

    .hero h1 {
      font-size: 24px;
    }

    .modal-header {
      height: 58px;
      padding: 0 12px 0 16px;
    }

    .modal-actions {
      gap: 8px;
    }

    .icon-btn {
      padding: 7px 10px;
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<header class="header">
  <div class="title">國立成功大學永續策略發展處 LLM 系統</div>
  <button class="btn btn-light" onclick="openModal()">開啟系統</button>
</header>

<main class="main">
  <section class="hero">
    <h1>校內 LLM 系統入口</h1>
    <p>
      點擊下方按鈕後，系統將以全螢幕視窗開啟。若因安全性設定無法嵌入顯示，
      系統會自動提供另開新視窗的替代操作。
    </p>
    <button class="btn btn-primary" onclick="openModal()">立即進入系統</button>
  </section>
</main>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>

<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-header">
    <div class="modal-title">NCKU LLM 系統</div>
    <div class="modal-actions">
      <button class="icon-btn" onclick="reloadFrame()">重新載入</button>
      <button class="icon-btn" onclick="openApp()">另開視窗</button>
      <button class="icon-btn" onclick="closeModal()">關閉</button>
    </div>
  </div>

  <div class="modal-body">
    <div id="loading" class="loading">載入系統中...</div>

    <iframe
      id="appFrame"
      title="NCKU LLM"
      src=""
      onload="hideLoading()">
    </iframe>

    <div id="fallback" class="fallback">
      <h3>系統無法嵌入顯示</h3>
      <p>
        目標系統可能因 iframe 安全性限制而無法直接顯示於本頁面，
        請改用新視窗開啟。
      </p>
      <button class="btn btn-primary" onclick="openApp()">點此開啟系統</button>
    </div>
  </div>
</div>

<script>
  const APP_URL = "https://undescriptively-solar-lang.ngrok-free.dev/";

  const modal = document.getElementById("modal");
  const modalOverlay = document.getElementById("modalOverlay");
  const frame = document.getElementById("appFrame");
  const loading = document.getElementById("loading");
  const fallback = document.getElementById("fallback");

  let loadTimer = null;
  let loaded = false;
  let initialized = false;

  function startLoadingCheck() {
    loaded = false;
    loading.classList.remove("hidden");
    fallback.style.display = "none";

    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => {
      if (!loaded) {
        loading.classList.add("hidden");
        fallback.style.display = "flex";
      }
    }, 3000);
  }

function openModal() {
  // 顯示 loading UI（可選）
  document.getElementById("loading").classList.remove("hidden");

  // 0.5秒後跳轉（有動畫感）
  setTimeout(() => {
    window.location.href = "https://undescriptively-solar-lang.ngrok-free.dev/auth?redirect=%2F";
  }, 500);
}

  function closeModal() {
    modal.classList.remove("show");
    modalOverlay.classList.remove("show");
    modal.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  function openApp() {
    window.open(APP_URL, "_blank", "noopener,noreferrer");
  }

  function reloadFrame() {
    startLoadingCheck();
    frame.src = APP_URL;
  }

  function hideLoading() {
    loaded = true;
    clearTimeout(loadTimer);
    loading.classList.add("hidden");
    fallback.style.display = "none";
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeModal();
    }
  });
</script>

</body>
</html>
